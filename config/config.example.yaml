# Pmon Configuration
# Copy this file to config.yaml and fill in your details
#
# IMPORTANT: Set the PMON_JWT_SECRET environment variable before running:
#   export PMON_JWT_SECRET="$(python -c 'import secrets; print(secrets.token_hex(32))')"
#
# CVV is never stored on disk — enter it at checkout time via the dashboard.

# How often to check for stock (seconds)
poll_interval: 30

# Notification settings
notifications:
  # Discord webhook URL (create one in your server settings)
  discord_webhook: ""
  # Log to console as well
  console: true

# Products to monitor
# Each product needs a URL and optionally a retailer hint
products:
  - url: "https://www.pokemoncenter.com/product/example-etb"
    name: "Example Pokemon Center ETB"
    auto_checkout: false

  - url: "https://www.target.com/p/example-pokemon/-/A-12345678"
    name: "Example Target Product"
    auto_checkout: false

  - url: "https://www.bestbuy.com/site/example/1234567.p"
    name: "Example Best Buy Product"
    auto_checkout: false

  - url: "https://www.walmart.com/ip/example/123456789"
    name: "Example Walmart Product"
    auto_checkout: false

  - url: "https://www.samsclub.com/p/example-pokemon-cards/prod12345678"
    name: "Example Sam's Club Product"
    auto_checkout: false

# Checkout profiles (for auto-checkout)
profiles:
  default:
    first_name: ""
    last_name: ""
    email: ""
    phone: ""
    address_line1: ""
    address_line2: ""
    city: ""
    state: ""
    zip_code: ""
    # Payment info is entered via the dashboard for security
    # Never store card numbers in config files

# Retailer-specific account credentials
accounts:
  target:
    email: ""
    password: ""
  walmart:
    email: ""
    password: ""
  bestbuy:
    email: ""
    password: ""
  samsclub:
    email: ""
    password: ""
  pokemoncenter:
    email: ""
    password: ""

# Browser mode
# Set headless: false to open a real Chrome window on your PC.
# This lets you log in manually, see the checkout happen, and handle CAPTCHAs.
# When running on a server (Railway, Docker), keep headless: true.
headless: true

# Optional: path to a Chrome user data directory to reuse existing logins.
# Each retailer gets a sub-folder (e.g., pmon_target, pmon_walmart).
# On Windows: "C:/Users/YourName/AppData/Local/Google/Chrome/User Data"
# On Mac: "/Users/YourName/Library/Application Support/Google/Chrome"
# On Linux: "/home/yourname/.config/google-chrome"
# Leave empty to use a fresh profile managed by Pmon.
chrome_profile_dir: ""

# Dashboard settings
dashboard:
  host: "127.0.0.1"
  port: 8888
